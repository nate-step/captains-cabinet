# Cabinet tmux config — optimized for long-running agent sessions

# Status bar shows which Officer windows are active
set -g status-style 'bg=#1a1a2e fg=#e0e0e0'
set -g status-left '#[fg=#00d4ff,bold] CABINET #[default]│ '
set -g status-right '#[fg=#888]%H:%M UTC '
set -g status-left-length 20

# Window labels
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#00d4ff,bold] #I:#W '

# Longer scrollback for agent output
set -g history-limit 50000

# Mouse support for scrolling through output
set -g mouse on

# Don't auto-rename windows
set -g allow-rename off

# Reduce escape delay (faster response)
set -sg escape-time 10

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
