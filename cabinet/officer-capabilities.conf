# =============================================================
# Officer Capabilities — capability-based hook routing
# =============================================================
# Maps officers to capabilities so hooks route behavior without
# hardcoding officer names. Founders: customize for your officer set.
#
# Format: officer:capability (one per line, # comments ignored)
#
# Available capabilities:
#   deploys_code            — pushes code to production (triggers deploy notifications)
#   validates_deployments   — validates live deployments (receives deploy alerts)
#   reviews_implementations — reviews implementations against specs (receives deploy alerts)
#   logs_captain_decisions  — must log decisions after Captain conversations
#   reviews_specs           — validates product specifications (receives spec alerts)
#   reviews_research        — validates research briefs (receives research alerts)
# =============================================================

cto:deploys_code
cto:logs_captain_decisions
cto:reviews_specs
coo:validates_deployments
cpo:reviews_implementations
cpo:reviews_research
