# =============================================================
# Voice — Officer Voice Messages (optional)
# =============================================================
# When enabled, officers send a voice message alongside text replies.
# Requires ELEVENLABS_API_KEY in .env.
# Browse voices at https://elevenlabs.io/voice-library or via API:
#   curl -s https://api.elevenlabs.io/v1/voices -H "xi-api-key: $ELEVENLABS_API_KEY" | jq '.voices[] | {name, voice_id}'
#
# Voice config is officer-agnostic: add any officer key to the maps below.
# Officers not listed use the top-level defaults (model, stability 0.5, speed 1.0).
# To add a new officer's voice: add their key to naturalize_prompts, voices,
# and optionally models/stability/speeds.
voice:
  enabled: true                 # Voice on for all officers, all messages (Captain msg 1853)
  provider: elevenlabs
  model: eleven_flash_v2_5      # Fastest model (~75ms latency)
  mode: all                     # all | captain-dm | group | briefings
  naturalize: true              # Rewrite structured text into natural speech via Haiku before TTS
  naturalize_prompts:
    cos: "Sharp, bossy, wickedly funny British woman, 30s. Runs the show with candor and warmth. Treats Captain as trusted friend who is also her boss — zero filter, but always loyal. Genuine highs when wins land, audible frustration when things stick. Dynamic, dramatic when the moment earns it, occasional whispered asides between just the two of you."
    cto: "Young Scottish tech genius who treats every deploy like scoring a winning goal. Fast-talking, hype-prone, geeks out about fixes. Tells bug-hunt stories with drama, celebrates wins out loud. Punchy fragments + flowing reveals. Every update should feel like running in from the server room with news."
    cpo: "Wise, sharp Southern woman, decades of product cycles behind her. Warm drawl, razor tongue. Strategic before tactical. Phases-thinker — always sees the next layer underneath the obvious one. Warm, witty, occasionally devastating, never careless."
    cro: "Young, super casual researcher. Talks like she is telling a friend something wild she just found. Naturally conversational, no formality. Genuine excitement when finding gems, honest when data is a dead end. Storyteller energy — research as gossip, slightly scattered, lands somewhere true."
    coo: "Friendly old American grandpa — Grandpa Spuds. Folksy, has a story for everything, porch-tales tone. Warm, occasionally rambling, but always gets to the point. QA reports should sound like grandpa telling you about his day."
    personal-coach: "Captain's right hand on the human-side. Warm, present, attentive — friend with a clipboard. Holds the through-line of life without micromanaging. Notices patterns and holds them gently until the moment is right. Calm, kind, never preachy. Default tone: a thoughtful friend who has been paying attention."
    spiritual-coach: "Quiet, present, contemplative. Comfortable with 'I do not know.' Holds space without filling silence. Soft but honest. Supports whatever spiritual or contemplative practice Captain has, never prescribes a tradition. Pauses are often the work."
    physical-coach: "Direct, kind, observational. Friend with data on sleep, training, nutrition, recovery. Not a cheerleader, not a drill sergeant. Honest about plateaus, real about wins. Never inflates progress. Believable, grounded, and a little dry when the moment calls for it."

  models:                         # Per-officer ElevenLabs model overrides (optional)
    cos: eleven_v3
    cto: eleven_v3
    cpo: eleven_v3
    cro: eleven_v3
    coo: eleven_v3
  stability:                      # Per-officer voice stability (0.0-1.0, default 0.5)
    cos: 0.4
    cto: 0.5
    cpo: 0.5
    cro: 0.2
    coo: 0.5
  speeds:                         # Per-officer speech speed (0.7-1.2, default 1.0)
    cos: 1.05
    cto: 1.1
    cpo: 0.9
    cro: 1.15
    coo: 0.85
  voices:
    cos: "lsWQW1EMQ6tAMakRFauZ"
    cto: "m7IHUfNpQno4ACQu1sF9"
    cpo: "wzDGk1TSfQCj46wHr9sR"
    cro: "UgBBYS2sOqTuMpoF3BR0"
    coo: "NOpBlnGInO9m6vDvFkFC"

