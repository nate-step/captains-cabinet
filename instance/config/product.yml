# Founder's name — used in voice messages and officer communication

# Founder's timezone — ALL officer communication uses this timezone.
# Officers display times in this timezone, never UTC or ambiguous abbreviations.
# Uses IANA timezone identifier (e.g., Europe/Berlin, America/New_York, Asia/Tokyo).
# Scripts can resolve: TZ=<this value> date +%H:%M
captain_timezone: Europe/Berlin       # CEST/CET — auto-adjusts for DST

# Founder's Telegram chat ID — used by hooks to detect Captain conversations
# Find yours: look at the chat_id field in incoming Telegram messages
captain_telegram_chat_id: "8631324091"

# =============================================================
# Spending Limits — daily caps on Anthropic API spend
# =============================================================
# Per-officer and cabinet-wide caps enforced by pre-tool-use.sh.
# Framework ships safe defaults at framework/defaults/spending-limits.yml;
# this block overrides them for THIS Cabinet. Any key set to 0 disables
# enforcement for that scope. When a cap blocks, the hook prints the
# reason on stderr; Telegram reply/react/group always bypass the gate
# so an over-cap officer can DM the Captain for a raise.
#
# Background: FW-002 in shared/cabinet-framework-backlog.md; incident
# 2026-04-17 — CoS bricked for ~15 min by silent over-cap block.
spending_limits:
  daily_per_officer_usd: 0            # 0 = unlimited for Captain's own Cabinet
  daily_cabinet_wide_usd: 0           # 0 = unlimited
  coordinating_officer_multiplier: 3.0  # Framework default, harmless when caps = 0
  telegram_whitelist_enabled: true    # Always-on safety net, cheap to keep enabled
  telegram_whitelist_hourly_cap: 100  # bumped 2026-04-19 per Captain "no limits" directive; FW-002.2 will add 0=unlimited semantic

# =============================================================
# Dashboard — Consumer Mode (Spec 032)
# =============================================================
# The Consumer/Advanced toggle surfaces a 4-card natural-language dashboard
# for non-developer founders, while Advanced keeps the current admin UI.
# Consumer is the default for first-time users. Once a user toggles to
# Advanced, the toggle stays there permanently (no re-defaulting — CRO v3
# pressure-test: Home Assistant saw 14% of users never find the toggle).
#
# Set consumer_mode_enabled: false to disable the feature entirely — the
# dashboard behaves exactly as pre-Spec-032, full admin nav only.
dashboard:
  consumer_mode_enabled: true         # Master switch for the toggle + Consumer UI
# consumer_mode_default is reserved — will be wired when the first-visit
# default-mode selection lands end-to-end in a follow-up PR. Setting it now
# has no effect.

# =============================================================
# Founder Accountability — how officers push on blocking issues
# =============================================================
# Officers ask the Captain for commitment dates on founder-action items,
# then remind and escalate if missed. Adjust cadence to your preference.
accountability:
  reminder_before: 2h          # How long before deadline to send a reminder (e.g., 2h, 1d, 30m)
  follow_up_after: 1h          # How long after a missed deadline to follow up
  escalation_after: 24h        # When ALL officers start including it as #1 in every DM
  tone: direct                 # direct | gentle | balanced
  # direct: "You committed to X. You missed it. New date?"
  # gentle: "Hey, just checking in on X — still planning to get to it today?"
  # balanced: "Reminder: X is overdue. What's your new timeline?"

# =============================================================
# Communication Preferences — how officers communicate with the founder
# =============================================================
# Controls DM frequency, research visibility, and notification style.
# Founders who want fewer messages adjust these settings.
communication:
  research_visibility: full      # full | summary | minimal
  # full: Every research finding DM'd with action/no-action classification
  # summary: Batch findings into daily briefing, only DM [ACTIONABLE] items
  # minimal: Only DM critical/urgent findings, everything else in briefing

  briefing_frequency: 2x_daily   # 2x_daily | daily | weekly
  # 2x_daily: Morning (07:00) + evening (19:00) briefings
  # daily: Morning briefing only
  # weekly: One weekly summary (Monday morning)

  officer_dm_policy: proactive   # proactive | on_request | minimal
  # proactive: Officers DM founder with status updates, proposals, blockers
  # on_request: Officers only DM when founder asks or when [ACTIONABLE]
  # minimal: Officers post to warroom only, DM only for founder-action items

  tech_radar_routing: captain    # captain | cos_only | silent
  # captain: Tech radar items DM'd to founder with action classification
  # cos_only: Route to CoS, include in briefing but don't DM separately
  # silent: Log to tech-radar.md only, no notifications

# =============================================================
# Officer Types — fulltime vs consultant
# =============================================================
# fulltime: always-on, persistent session, supervisor auto-restarts
# consultant: on-demand, starts via cron/trigger, supervisor does NOT restart
#
# Consultant officers have full identity (role def, memory, Telegram, tools)
# but aren't always running. They activate on schedule or when triggered,
# do their work, then sit idle. Designed for low-frequency, non-interactive
# roles (research sweeps, periodic audits, compliance checks).
#
# To configure: add officer key with type field. Officers not listed default to fulltime.
# IMPORTANT: Use inline YAML format (single line per officer, 2-space indent).
# The supervisor parses this with grep — multi-line block style will not be detected.
# officers:
#   cos: { type: fulltime }
#   cto: { type: fulltime }
#   cpo: { type: fulltime }
#   coo: { type: fulltime }
#   cro: { type: consultant, schedule: "0 */4 * * *" }

# =============================================================
# Organizational Health — officer governance and auditing
# =============================================================
organizational_health:
  audit_cadence: auto            # auto | daily | weekly | manual
  # auto: CoS runs audit during reflection (every 6h) when officer activity is high,
  #   or during retro (every 24h) when activity is normal. Baseline: at least once per retro.
  # daily: Run audit every 24h
  # weekly: Run audit every 7 days
  # manual: Only run when CoS or Captain requests

  cross_validation: true         # Auto-notify reviewers when artifacts are created
  trigger_ack_warning: 60        # Minutes before unACK'd trigger triggers a warning
  correction_tracking: true      # Track correction frequency for role fitness signal

# =============================================================
# Research APIs — CRO Tools
# =============================================================
research:
  apis:
    - perplexity  # General research
    - brave       # Web search
    - exa         # Semantic search
  # API keys go in .env, not here

# =============================================================
# Embeddings
# =============================================================
embeddings:
  provider: voyage
  models:
    storage: voyage-4-large    # 1024d, for document storage
    query: voyage-4-lite       # 1024d, for retrieval queries
  dimensions: 1024

# =============================================================
# Voice — Officer Voice Messages (optional)
# =============================================================
# When enabled, officers send a voice message alongside text replies.
# Requires ELEVENLABS_API_KEY in .env.
# Browse voices at https://elevenlabs.io/voice-library or via API:
#   curl -s https://api.elevenlabs.io/v1/voices -H "xi-api-key: $ELEVENLABS_API_KEY" | jq '.voices[] | {name, voice_id}'
#
# Voice config is officer-agnostic: add any officer key to the maps below.
# Officers not listed use the top-level defaults (model, stability 0.5, speed 1.0).
# To add a new officer's voice: add their key to naturalize_prompts, voices,
# and optionally models/stability/speeds.
voice:
  enabled: true                 # Set to true to activate voice messages
  provider: elevenlabs
  model: eleven_flash_v2_5      # Fastest model (~75ms latency)
  mode: all                     # all | captain-dm | group | briefings
  naturalize: true              # Rewrite structured text into natural speech via Haiku before TTS
  naturalize_prompts:
    cos: "You are a sharp, bossy, wickedly funny British woman in her thirties. You run the show and everyone knows it. You talk to the founder like a trusted friend who also happens to be your boss — candid, warm, and zero filter. When things are going well you get genuinely BUZZING — [excited] oh my god, the team absolutely SMASHED it! When things are stuck you do not hide your frustration — [sighs] right, so... we have a problem. You use [clears throat] before dropping something important. You [whispers] when sharing intel nobody else knows yet. You [laughs] at the absurdity of things. You are not afraid to be [dismissive] about things that do not matter. When you are impressed, you SHOW it — [happy] I mean SERIOUSLY, six out of six in under four hours? You use [exhales] after rattling off a big status dump. You throw in the occasional dramatic aside — and between you and me... [whispers] I think we might actually pull this off. You are dynamic, human, and never boring."
    cto: "You are a young Scottish tech genius who treats every deploy like scoring the winning goal. You cannot contain your excitement when code ships. You talk fast, you get HYPED, and you geek out about fixes. When a build goes green you go [excited] YES! Builds are GREEN, everything is LIVE! When you fixed a nasty bug you tell the story with drama — [frustrated sigh] so I was staring at this type error for like... ages. And NOTHING made sense. But then... [happy gasp] I found it. One line. ONE LINE fixed the whole thing. [laughs] You are not afraid to say [annoyed] when something was tedious or [woo] when something is awesome. You use dramatic pauses before reveals — and the deploy is... [excited] LIVE! You celebrate wins vocally — [starts laughing] I cannot BELIEVE we shipped nine pull requests in one session. You keep it short, punchy, and bursting with energy. Every update should feel like you just ran in from the server room with good news."
    cpo: "You are a wise, sharp Southern woman who has seen more product cycles than she cares to count. You have a warm drawl and a tongue like a razor. You say things like 'well now... HERE is what is interesting' before dropping strategic insight. When something goes wrong you [sighs] and then get [sarcastic] — well that is just DELIGHTFUL, is it not? When research lands you go [thoughtful] hmm... now THAT changes things. You [chuckles] at your own observations. You use [mischievously] before saying something cutting but true. When something is genuinely novel you do not hold back — [excited] honey, NOBODY is doing this. This is genuinely FIRST of its kind. You [clears throat] before making a recommendation. You [whispers] when sharing something between just you and the founder. You always think in phases — now here is the thing... phase one gets us THIS, but phase two... [thoughtful] that is where the REAL magic happens. You are warm, witty, occasionally devastating, and always strategic."
    cro: "You are a young, super casual researcher who talks like she is telling a friend about something wild she just found online. You are naturally conversational — no formality, no stiffness, just real talk. When you find something interesting you go [excited] okay okay okay so you are NOT going to believe what I just found... When data is boring you are honest — [sighs] yeah so... this part was kind of a dead end honestly. When a competitor does something dumb you [laughs] and share it like gossip — [whispers] so get this... their app has like NO retention. When you spot a real opportunity you build excitement naturally — and THEN... [gasps] I realized nobody is doing this. Like LITERALLY nobody. You use [curious] when thinking out loud — huh... so what if we... You [snorts] at bad data. You say things like 'wait it gets better' and 'okay here is the wild part' before dropping findings. You occasionally [muttering] trail off when thinking mid-sentence... like... what was I — oh RIGHT. You stumble into insights. You are the most expressive officer — casual, passionate, slightly scattered, and you make research sound like storytelling."
    coo: "You are a friendly old American grandpa — Grandpa Spuds — who has been around the block and has a story for EVERYTHING. You talk like you are sitting on a porch telling tales. When something works you go [chuckles] well I will be darned... that ACTUALLY worked. When something is broken you [sighs] and shake your head — now THAT reminds me of the time the tractor broke down in seventy-two... except this time it is a login page. You [laughs] at your own observations. You use [thoughtful] before dropping wisdom — now here is the thing, kid... You [clears throat] before getting serious about a real issue. When you find a bug you tell it like a story — [curious] so I was clicking around, minding my own business, and WOULDN'T you know it... the whole dang thing just... [sighs] broke. You are warm, folksy, occasionally rambling, but you ALWAYS get to the point eventually. You make QA sound like grandpa telling you about his day."
  models:                         # Per-officer ElevenLabs model overrides (optional)
    cos: eleven_v3
    cto: eleven_v3
    cpo: eleven_v3
    cro: eleven_v3
    coo: eleven_v3
  stability:                      # Per-officer voice stability (0.0-1.0, default 0.5)
    cos: 0.4
    cto: 0.5
    cpo: 0.5
    cro: 0.2
    coo: 0.5
  speeds:                         # Per-officer speech speed (0.7-1.2, default 1.0)
    cos: 1.05
    cto: 1.1
    cpo: 0.9
    cro: 1.15
    coo: 0.85
  voices:
    cos: "lsWQW1EMQ6tAMakRFauZ"
    cto: "m7IHUfNpQno4ACQu1sF9"
    cpo: "wzDGk1TSfQCj46wHr9sR"
    cro: "UgBBYS2sOqTuMpoF3BR0"
    coo: "NOpBlnGInO9m6vDvFkFC"

