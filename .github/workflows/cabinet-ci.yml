name: Cabinet CI

# FW-026 Option 3 — belt-and-suspenders CI for Cabinet framework code.
# Additive to the pre-push gate (`scripts/pre-push-gate.sh`): local hook catches
# 99% of regressions pre-push, this workflow catches the 1% where officers push
# from host shell or where a `--no-verify` bypass slipped through.
#
# Runs: syntax checks (bash -n) + shell unit tests + Python tests + golden evals.
# Does NOT run: Dockerfile rebuilds, deploy-triggering ops, MCP integration.
# Minimal by design — expand once signal justifies.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: cabinet-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # pre-compact.sh, stop-hook.sh, run-golden-evals.sh read REDIS_HOST directly.
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      # pre-tool-use.sh + post-tool-use.sh derive host/port from REDIS_URL — the
      # REDIS_HOST/PORT above would otherwise be ignored, and redis-cli attempts
      # to resolve the (non-existent on GH runner) `redis` service hostname.
      # First CI run (24855610921) failed EVAL-001/008/015/016 for exactly this.
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: founders-cabinet

      - name: Mount checkout at /opt/founders-cabinet
        # Many scripts hardcode /opt/founders-cabinet paths; symlinking is cheaper
        # than refactoring CABINET_ROOT usage across the codebase.
        run: sudo ln -s "$GITHUB_WORKSPACE/founders-cabinet" /opt/founders-cabinet

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools jq

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          # Python tests stub requests/yaml/psycopg2 via sys.modules, so real
          # packages are optional. Install anyway to match officer container.
          pip3 install psycopg2-binary requests pyyaml pytest

      - name: Setup Node
        # FW-048: dashboard typecheck needs node + npm. Node 20 matches
        # Next.js 15 requirements.
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: founders-cabinet/cabinet/dashboard/package-lock.json

      - name: Bash syntax check — hooks
        run: |
          set -e
          for f in /opt/founders-cabinet/cabinet/scripts/hooks/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Bash syntax check — lib
        run: |
          set -e
          for f in /opt/founders-cabinet/cabinet/scripts/lib/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Bash syntax check — scripts top-level
        # 56 scripts at cabinet/scripts/*.sh (create-officer, resume-officer,
        # notify-officer, record-experience, org-health-audit, etc.) are on the
        # hot path for officer provisioning + day-to-day comms. Prior coverage
        # was hooks/ + lib/ only — top-level syntax regressions would slip
        # through every other step (which reads config via these scripts).
        run: |
          set -e
          for f in /opt/founders-cabinet/cabinet/scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Bash syntax check — remaining subdirs (git-hooks, gates, cutover)
        # Catches bash scripts in deeper subdirs the earlier globs miss:
        # - git-hooks/pre-commit + pre-push (no .sh extension, safety rails for
        #   force-push refusal + checkpoint-review gate, FW-007 + FW-019)
        # - gates/*.sh (library-write gates, FW-021 idempotency-hash)
        # - cutover/*.sh (Spec 039 migration tooling)
        # Selects by shebang instead of extension so new subdirs are caught too.
        # -mindepth 2 avoids re-checking top-level (covered by previous step).
        run: |
          set -e
          while IFS= read -r f; do
            echo "bash -n $f"
            bash -n "$f"
          done < <(find /opt/founders-cabinet/cabinet/scripts -mindepth 2 \
                     \( -path '*/hooks/*' -o -path '*/lib/*' \) -prune -o \
                     -type f -print \
                   | while IFS= read -r ff; do
                       head -1 "$ff" 2>/dev/null | grep -qE '^#!.*bash' && echo "$ff"
                     done)

      - name: shellcheck hooks + lib + scripts root (severity=error)
        # FW-054: static analysis gate for the 12 hook + lib scripts.
        # FW-055: extended to cover the 57 root-level cabinet/scripts/*.sh files
        # (officer lifecycle, cost tooling, orchestration). 2 SC2045 instances
        # found in the FW-055 survey 2026-04-24 (resume-officer.sh + suspend-
        # officer.sh) were fixed in PR #48 (commit 677275e) before this gate
        # widening so the expanded surface is green on first run.
        # --severity=error catches genuine bugs (SC2064 trap-in-subshell,
        # SC2090 array-quoting, SC2094 read/write same file, etc.) without
        # noise from style warnings. ubuntu-latest has shellcheck pre-installed.
        run: |
          shellcheck --version
          shellcheck --severity=error --shell=bash \
            /opt/founders-cabinet/cabinet/scripts/hooks/*.sh \
            /opt/founders-cabinet/cabinet/scripts/lib/*.sh \
            /opt/founders-cabinet/cabinet/scripts/*.sh

      - name: Shell unit tests — triggers.sh
        run: bash /opt/founders-cabinet/cabinet/scripts/test-triggers.sh

      - name: Shell unit tests — memory.sh
        run: bash /opt/founders-cabinet/cabinet/scripts/test-memory.sh

      - name: Shell unit tests — audit-framework-backlog-drift.sh
        # Guards the drift auditor (FW-002 safety net) against silent regressions.
        # 12 fixture scenarios covering fresh/stale × Proposed/Paused × SHIPPED-skip
        # × no-date-skip × env threshold overrides × missing-file handling × advisory-
        # exit invariant. If this test breaks, the auditor may still run green in CI
        # but silently hide drift classes. See scripts/test-audit-framework-backlog-drift.sh.
        run: bash /opt/founders-cabinet/cabinet/scripts/test-audit-framework-backlog-drift.sh

      - name: Shell unit tests — start-officer.sh args (FW-073)
        # 22 assertions across 8 test groups: legacy back-compat, --project
        # arg parsing, CABINET_ACTIVE_PROJECT export contract (FW-072 trigger),
        # path-injection guard on slug, slug length cap (32 char), defensive
        # unset against env-file pollution, missing-env-file rejection, unknown
        # arg + missing officer rejections. Pins the pool-mode opt-in semantics
        # so legacy single-project deployments cannot accidentally start
        # writing per-project HSET fields without an explicit --project flag.
        run: bash /opt/founders-cabinet/cabinet/tests/start-officer/test-args.sh

      - name: Shell unit tests — post-tool-use.sh JSONL project field (FW-075)
        # 9 assertions: project field surfaces in JSONL when CABINET_ACTIVE_PROJECT
        # is set (FW-073 export contract); legacy mode emits empty field; malformed
        # slug (charset, leading hyphen, length>32) defensively falls back to empty
        # so corrupted env never produces malformed JSONL. Pins the FW-075 H3 field
        # contract so downstream dashboard/retro queries can rely on it.
        run: bash /opt/founders-cabinet/cabinet/scripts/test-post-tool-use-jsonl.sh

      - name: Shell unit tests — cabinet-spawn.sh (FW-080)
        # 38 assertions across 8 test groups: bad slug rejection (charset + length),
        # missing/bad repo_url rejection, DRY_RUN=1 dry-run plan (no side effects,
        # no state file), --skip-create with provisioned + unprovisioned slugs,
        # --officers restriction to a subset, idempotency (re-run safe), secret
        # non-echo (GITHUB_PAT), and hyphenated slug validation.
        # All assertions use DRY_RUN=1 or pre-flight rejections — no real tmux
        # sessions, Redis writes, or create-project.sh calls are made in CI.
        run: bash /opt/founders-cabinet/cabinet/scripts/test-cabinet-spawn.sh

      - name: Shell unit tests — cabinet-bootstrap.sh (FW-082)
        # 38 assertions across 7 test groups: bad slug rejection (charset + length),
        # missing preset rejection, DRY_RUN=1 plan-only mode (no filesystem side-effects,
        # no state file, no secrets in output), secret redaction (Neon URL password
        # stripped to [REDACTED] in all output), validate.sh hard-gate (preset with
        # failing validate.sh aborts bootstrap + no partial state), re-run resumability
        # (step_is_done guard present, 'already completed' skip message wired), and
        # bad --peer-cabinet syntax rejected (colon-count check).
        # All assertions use DRY_RUN=1 or exit-on-validation — no real filesystem writes,
        # git clones, Docker ops, Redis writes, or Neon connections are made in CI.
        run: bash /opt/founders-cabinet/cabinet/scripts/test-cabinet-bootstrap.sh

      - name: Shell unit tests — create-project.sh (FW-078)
        # 25 assertions across 8 test groups: bad slug charset/length rejection,
        # missing repo_url rejection, DRY_RUN=1 plan-only mode (no filesystem
        # side-effects, no state file), idempotency (re-run finds completed steps,
        # state file cleaned up on full success), mid-run failure leaves state file
        # for resumability, output yml is structurally valid YAML with correct
        # mount_path and repo URL, output env file has all required fields (no
        # GITHUB_PAT leak). Uses pre-seeded state files + invalid git URLs so no
        # real clone, Redis write, or Telegram call is made during CI.
        env:
          GITHUB_PAT: ci-stub-token
        run: bash /opt/founders-cabinet/cabinet/scripts/test-create-project.sh

      - name: Shell unit tests — pre-push hook (FW-007 + FW-025)
        # 14 scenarios / 31 assertions covering the safety-critical pre-push hook:
        # non-master fast-paths, legit fast-forward + first-create, force-overwrite
        # + delete refusal, every is_announced() rejection branch (malformed TS,
        # future TS, >300s stale, log missing, log is symlink, TS absent from log),
        # and the full success path. Eval gate (FW-025) is stubbed per-fixture.
        # Hook guards master branch integrity — regressions here would silently
        # allow force-push/delete on master. See test-pre-push-hook.sh.
        run: bash /opt/founders-cabinet/cabinet/scripts/test-pre-push-hook.sh

      - name: Python tests — ETL transforms (FW-023)
        run: |
          cd /opt/founders-cabinet/cabinet/scripts/lib
          python3 -m pytest tests/ -v

      - name: Python tests — Gate 3 idempotency hash (FW-021)
        run: |
          cd /opt/founders-cabinet/cabinet/scripts/gates
          python3 -m pytest tests/ -v

      - name: Python tests — Cutover service-accounts (Spec 039 §5.9 Gate 4)
        # 15 tests: Linear/GH demotion-target enumeration + assert_captain_excluded
        # tripwire (COO adversary H-γ — prevents Captain demotion during cutover).
        # Monkey-patches load_officer_emails per-test so no dep on live yaml.
        run: |
          cd /opt/founders-cabinet/cabinet/scripts/cutover
          python3 -m pytest tests/ -v

      - name: Python tests — MCP server (FW-005)
        # 20 tests: stdio + HTTP transport, bearer auth, error handling.
        # Runs as a standalone script (not pytest) — the file's __main__ block
        # drives unittest. Spec 035 Phase A shipped in #33, so this is the
        # regression net for cross-Cabinet comms.
        run: python3 /opt/founders-cabinet/cabinet/mcp-server/test_server.py

      - name: Python tests — MCP host-tools (Spec 035 Phase A, CoS-only)
        # 38 tests pinning args-validation + ConnectionError translation
        # across all 6 host_* handlers, streaming reassembly for tail_logs
        # + read_file, and the JSON-RPC dispatcher (initialize / tools-list
        # / tools-call success+unknown+handler-raise / unknown-method).
        # Surface is CoS-only and gates root-level host operations — any
        # regression in args-validation or error translation leaks opaque
        # errors to the daemon. Standalone unittest, no pytest dep.
        run: python3 /opt/founders-cabinet/cabinet/mcp-server/test_host_tools.py

      - name: Python tests — Host-agent (Spec 035 Phase A)
        # 49 tests: auth protocol, error codes, log-before-exec, timeout,
        # peer-cred rejection, pause flag, self-restart-forbidden, file-too-large,
        # patch-failed. Uses mock Unix sockets — no root/daemon required.
        # Standalone script mode (uses unittest discovery via __main__).
        run: python3 /opt/founders-cabinet/cabinet/host-agent/test_server.py

      - name: Dashboard typecheck (tsc --noEmit)
        # FW-048: catch TS errors in dashboard before they reach Captain's
        # localhost:3100. tsconfig has noEmit:true, so `npx tsc` alone is
        # pure type-check (no JS output).
        run: |
          cd /opt/founders-cabinet/cabinet/dashboard
          npm ci
          npx tsc --noEmit

      - name: Dashboard vitest
        # FW-050: run full vitest test suite (auto-discovers src/**/*.test.ts).
        # vitest.config.ts excludes .next/** mirrors so only real tests run.
        run: |
          cd /opt/founders-cabinet/cabinet/dashboard
          npm test

      - name: Golden evals
        # EVAL-023 (FW-047) runs under CABINET_HOOK_TEST_MODE=1 so trigger_send
        # fan-out is suppressed. This step also exercises the full hook-probe
        # surface end-to-end.
        run: bash /opt/founders-cabinet/cabinet/scripts/run-golden-evals.sh

      - name: Captain-rules retrieval eval
        # Spec 042 Phase 3: golden eval over 5 anchor fixtures asserting
        # query.sh surfaces the expected anchors + patterns + intents
        # for synthetic Captain DMs. Catches regressions in trigger-word
        # tuning + indexer schema drift. Exits non-zero on any fixture FAIL.
        run: bash /opt/founders-cabinet/cabinet/scripts/captain-rules/eval.sh

      - name: Captain-rules encode-pipeline eval
        # Spec 048 v2: hermetic regression eval over the encode → draft →
        # ratify path (skipping API-bound classify-rule.sh). Pins the
        # draft template shape (set -u, env-var disable, JSONL log path),
        # ratify yes/no semantics (settings.json patch on yes, untouched
        # on no), audit-log entries, pending-marker cleanup, and graceful
        # values-only short-circuit. 29 assertions; any silent breakage
        # of draft-generator.sh or ratify-rule.sh fails CI.
        run: bash /opt/founders-cabinet/cabinet/scripts/captain-rules/eval-encode-pipeline.sh

      - name: Hook regression harnesses
        # FW-051 addendum: 7 permanent harnesses at cabinet/tests/hook-regression/
        # (fw041/042/043/044/045/051) snapshot each FW-0xx adversary-finding
        # validation. Runner applies per-harness tolerance for documented
        # deferrals (fw044 ≤8 = FW-051 closures labeled "deferred" pre-ship;
        # fw051-baseline ≤2 = AC-3/AC-9 dataflow-decoupled).
        # Hardcoded `-h redis` in DEL cleanup calls fails silently in CI
        # (keys aren't set in fresh CI redis anyway); hook itself reads REDIS_URL.
        run: bash /opt/founders-cabinet/cabinet/scripts/run-hook-regression.sh

      - name: Framework backlog drift audit (advisory)
        # Surfaces FW-series entries with Status: Proposed/Paused older than
        # threshold (default: Proposed≥7d, Paused≥14d). Advisory only — exits
        # 0 always, never fails CI. Catches the FW-002 drift class (shipped
        # code + stale Proposed status for 7 days unnoticed). Punch-list
        # shows in the CI run log; CTO reacts in the next /loop tick.
        run: bash /opt/founders-cabinet/cabinet/scripts/audit-framework-backlog-drift.sh
