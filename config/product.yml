# =============================================================
# Founder's Cabinet — Product Configuration
# =============================================================
# This file connects the Cabinet framework to a specific product.
# Fork founders-cabinet, edit this file, and deploy.
#
# Every ID below is a Notion page or database ID.
# Get them from your Notion workspace URLs.
# =============================================================

product:
  name: Sensed
  description: "Dual-map product for meaningful and anomalous human experiences"
  repo: https://github.com/nate-step/Sensed
  repo_branch: main
  mount_path: /workspace/product  # Where Docker mounts the product repo

# =============================================================
# Notion — Business Brain
# =============================================================
# The Cabinet's knowledge layer. Officers read strategy and write research here.

notion:
  # Top-level workspace root
  cabinet_hq_id: 331412e2-7cc5-815c-b533-e18353773815

