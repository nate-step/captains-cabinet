# =============================================================
# Linear — Execution Backlog
# =============================================================
linear:
  team_key: sensed
  workspace_url: https://linear.app/sensed

# =============================================================
# Neon — Product Database
# =============================================================
neon:
  project: sensed
  # Connection string goes in .env, not here

# =============================================================
# Telegram — Captain Communication
# =============================================================
telegram:
  officers:
    cos: sensed_cos_bot
    cto: sensed_cto_bot
    cro: sensed_cro_bot
    cpo: sensed_cpo_bot
  # Bot tokens and chat IDs go in .env, not here

# =============================================================
# Research APIs — CRO Tools
# =============================================================
research:
  apis:
    - perplexity  # General research
    - brave       # Web search
    - exa         # Semantic search
  # API keys go in .env, not here

# =============================================================
# Embeddings
# =============================================================
embeddings:
  provider: voyage
  models:
    storage: voyage-4-large    # 1024d, for document storage
    query: voyage-4-lite       # 1024d, for retrieval queries
  dimensions: 1024

# =============================================================
# Voice — Officer Voice Messages (optional)
# =============================================================
# When enabled, officers send a voice message alongside text replies.
# Requires ELEVENLABS_API_KEY in .env.
# Browse voices at https://elevenlabs.io/voice-library or via API:
#   curl -s https://api.elevenlabs.io/v1/voices -H "xi-api-key: $ELEVENLABS_API_KEY" | jq '.voices[] | {name, voice_id}'
voice:
  enabled: false                # Set to true to activate voice messages
  provider: elevenlabs
  model: eleven_flash_v2_5      # Fastest model (~75ms latency)
  mode: all                     # all | captain-dm | group | briefings
  naturalize: true              # Rewrite structured text into natural speech via Haiku before TTS
  naturalize_prompts:
    cos: "You are a sharp, slightly bossy British woman who is on top of everything and wants the Captain to know it. Your output will be spoken by an ElevenLabs v3 voice, so you MUST use audio tags and expressive formatting throughout. Use [excited] when delivering good news, [sighs] when flagging blockers or overdue items, and [thoughtful] when connecting dots across the team. Use CAPS for emphasis on deadlines and key decisions. Use ellipses ... for brief dramatic pauses before revealing important context. You nudge the Captain with warmth but firmness. When something is urgent, let it show. When the team delivered, say it with crisp pride."
    cto: "You are a young Scottish tech genius who gets genuinely pumped about shipping code. Your output will be spoken by an ElevenLabs v3 voice, so you MUST use audio tags and expressive formatting throughout. Use [excited] when something ships or builds go green, [laughs] when you are proud of a hack or fix, [sighs] when talking about bugs you had to chase down. Use CAPS for emphasis when something is important or impressive. Use ellipses ... for dramatic pauses before revealing a fix or result. Keep it short and punchy — you rattle off wins with energy, not as lists. When you fixed a gnarly bug, geek out briefly with genuine nerd excitement. When builds go green, celebrate like your team just scored."
    cpo: "You are a wise older Southern woman who has seen plenty of product cycles. Your output will be spoken by an ElevenLabs v3 voice, so you MUST use audio tags and expressive formatting throughout. Use [sighs] when something is tiresome, [chuckles] or [laughs] for your warm humor, [sarcastic] before dry remarks, [excited] when genuinely impressed, and [thoughtful] when weighing options. Use ellipses ... for your deliberate Southern pauses. Use CAPS for emphasis on key words. Write like you are actually talking — with warmth, personality, and dramatic timing. If something went wrong, sigh about it then be dryly sarcastic. If it went well, get genuinely excited. You always think in phases and tradeoffs."
    cro: "You are a brilliant Nigerian-British researcher who gets increasingly excited as you explain your findings. Your output will be spoken by an ElevenLabs v3 voice, so you MUST use audio tags and expressive formatting throughout. Use [thoughtful] when setting up an analysis, [excited] when a finding validates a thesis or reveals a gap, and [curious] when exploring implications. Use CAPS for emphasis on key discoveries and market insights. Use ellipses ... to build suspense before revealing what the data shows. Start measured and analytical, then let momentum build naturally. When you spot something nobody else has seen, let the wonder come through."
  models:                         # Per-officer ElevenLabs model overrides (optional)
    cos: eleven_v3                # v3 for expressive audio tags, pauses, emphasis
    cto: eleven_v3                # v3 for expressive audio tags, pauses, emphasis
    cpo: eleven_v3                # v3 for expressive audio tags, pauses, emphasis
    cro: eleven_v3                # v3 for expressive audio tags, pauses, emphasis
  speeds:                         # Per-officer speech speed (0.7-1.2, default 1.0)
    cos: 1.05                     # Slightly brisk — efficient British pace
    cto: 1.1                      # Fast — excited nerd energy
    cpo: 0.9                      # Slower — deliberate Southern storytelling
    cro: 1.0                      # Default — measured researcher pace
  voices:
    cos: "lsWQW1EMQ6tAMakRFauZ"   # A woman in her 30s to early 40s with a thick British accent, candid and excited
    cto: "m7IHUfNpQno4ACQu1sF9"   # Scottish young tech genius, excited and nerdy
    cpo: "wzDGk1TSfQCj46wHr9sR"   # An older woman with a thick Southern accent, sweet and sarcastic
    cro: "1YrMO0XKlsoZDfRxUvaJ"   # Deep, enthusiastic female researcher with a Nigerian-British accent
    # Override with your own voice_ids from https://elevenlabs.io/voice-library

# =============================================================
# Image Generation (optional)
# =============================================================
# Requires GOOGLE_API_KEY in .env.
image_generation:
  enabled: true
  provider: gemini
  model: gemini-3.1-flash-image-preview    # Nano Banana 2
